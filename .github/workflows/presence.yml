name: Update Roblox Presence

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & write presence
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_COOKIE:  ${{ secrets.ROBLOX_COOKIE }}
        run: |
          USER_ID=3404416545
          SUCCESS=false

          fetch_presence() {
            local label="$1"
            shift
            echo "--- Trying: $label ---"
            HTTP_CODE=$(curl -s -o /tmp/rbx_response.json -w "%{http_code}" \
              -X POST "https://presence.roblox.com/v1/presence/users" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$@" \
              -d "{\"userIds\":[$USER_ID]}")
            echo "HTTP $HTTP_CODE — response: $(cat /tmp/rbx_response.json)"
            if [ "$HTTP_CODE" = "200" ] && jq -e '.userPresences[0]' /tmp/rbx_response.json > /dev/null 2>&1; then
              echo "✓ $label succeeded"
              return 0
            fi
            echo "✗ $label failed (HTTP $HTTP_CODE)"
            return 1
          }

          # ── Attempt 1: Open Cloud API key (no expiry) ──────────────────────
          if [ -n "$ROBLOX_API_KEY" ]; then
            if fetch_presence "Open Cloud API key" \
                -H "x-api-key: ${ROBLOX_API_KEY}"; then
              SUCCESS=true
            fi
          else
            echo "ROBLOX_API_KEY secret not set, skipping."
          fi

          # ── Attempt 2: Cookie + CSRF (fallback) ────────────────────────────
          if [ "$SUCCESS" = "false" ] && [ -n "$ROBLOX_COOKIE" ]; then
            echo "--- Getting CSRF token ---"
            CSRF=$(curl -si -X POST "https://auth.roblox.com/v2/logout" \
              -H "Content-Type: application/json" \
              -H "Cookie: .ROBLOSECURITY=${ROBLOX_COOKIE}" \
              | grep -i "x-csrf-token:" | awk '{print $2}' | tr -d '\r\n')
            echo "CSRF token length: ${#CSRF}"
            if fetch_presence "Cookie + CSRF" \
                -H "Cookie: .ROBLOSECURITY=${ROBLOX_COOKIE}" \
                -H "x-csrf-token: ${CSRF}"; then
              SUCCESS=true
            fi
          elif [ "$SUCCESS" = "false" ]; then
            echo "ROBLOX_COOKIE secret not set either."
          fi

          # ── Result ─────────────────────────────────────────────────────────
          if [ "$SUCCESS" = "false" ]; then
            echo "::warning::All presence methods failed. Set ROBLOX_API_KEY or ROBLOX_COOKIE in repository secrets."
            exit 0   # Exit 0 so the workflow doesn't spam red X on every run
          fi

          jq --arg ts "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
            '.userPresences[0] | {
               userPresenceType: (.userPresenceType // 0),
               lastLocation:     .lastLocation,
               gameId:           .gameId,
               placeId:          .placeId,
               updatedAt:        $ts
             }' /tmp/rbx_response.json > data/presence.json

          echo "--- presence.json ---"
          cat data/presence.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/presence.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update presence [skip ci]"
            git pull --rebase origin main
            git push
          fi
