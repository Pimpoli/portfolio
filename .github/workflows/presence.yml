name: Update Roblox Presence

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret exists
        run: |
          if [ -z "$ROBLOX_COOKIE" ]; then
            echo "ERROR: ROBLOX_COOKIE secret is not set in GitHub repository secrets."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Cookie secret is present (length: ${#ROBLOX_COOKIE})"
        env:
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}

      - name: Fetch presence
        env:
          ROBLOX_COOKIE:  ${{ secrets.ROBLOX_COOKIE }}
          ROBLOX_USER_ID: '3404416545'
        run: node scripts/fetch-presence.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/presence.json
          git diff --staged --quiet || git commit -m "chore: update presence [skip ci]"
          git push
