name: Update Roblox Presence

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch presence
        env:
          ROBLOX_COOKIE:  ${{ secrets.ROBLOX_COOKIE }}
          ROBLOX_USER_ID: '3404416545'
        run: node scripts/fetch-presence.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/presence.json
          git diff --staged --quiet || git commit -m "chore: update presence [skip ci]"
          git push
