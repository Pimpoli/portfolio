name: Update Roblox Presence

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & write presence
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_COOKIE:  ${{ secrets.ROBLOX_COOKIE }}
        run: |
          USER_ID=3404416545
          SUCCESS=false

          # ── Helper: write presence.json directly ───────────────────────────
          write_presence() {
            local type="$1" location="$2" gameid="$3" placeid="$4"
            local loc_json="null" gid_json="null" pid_json="null"
            [ -n "$location" ] && loc_json="\"$location\""
            [ -n "$gameid"   ] && gid_json="\"$gameid\""
            [ -n "$placeid"  ] && pid_json="$placeid"
            cat > data/presence.json << JSONEOF
          {
            "userPresenceType": $type,
            "lastLocation": $loc_json,
            "gameId": $gid_json,
            "placeId": $pid_json,
            "updatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          }
          JSONEOF
            echo "Presence written: type=$type location=$location"
          }

          # ── Helper: call presence.roblox.com with given headers ────────────
          call_presence_api() {
            local label="$1"; shift
            echo "--- Trying: $label ---"
            HTTP_CODE=$(curl -s -o /tmp/rbx_response.json -w "%{http_code}" \
              -X POST "https://presence.roblox.com/v1/presence/users" \
              -H "Content-Type: application/json" -H "Accept: application/json" \
              "$@" -d "{\"userIds\":[$USER_ID]}")
            echo "HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] && jq -e '.userPresences[0]' /tmp/rbx_response.json > /dev/null 2>&1; then
              jq --arg ts "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
                '.userPresences[0] | {
                   userPresenceType: (.userPresenceType // 0),
                   lastLocation: .lastLocation, gameId: .gameId,
                   placeId: .placeId, updatedAt: $ts
                 }' /tmp/rbx_response.json > data/presence.json
              echo "✓ $label succeeded"
              return 0
            fi
            echo "✗ $label failed — response: $(cat /tmp/rbx_response.json)"
            return 1
          }

          # ── Method 1: Open Cloud API key (no expiry) ───────────────────────
          if [ -n "$ROBLOX_API_KEY" ]; then
            call_presence_api "Open Cloud API key" -H "x-api-key: ${ROBLOX_API_KEY}" \
              && SUCCESS=true
          fi

          # ── Method 2: Cookie + CSRF token ──────────────────────────────────
          if [ "$SUCCESS" = "false" ] && [ -n "$ROBLOX_COOKIE" ]; then
            CSRF=$(curl -si -X POST "https://auth.roblox.com/v2/logout" \
              -H "Content-Type: application/json" \
              -H "Cookie: .ROBLOSECURITY=${ROBLOX_COOKIE}" \
              | grep -i "x-csrf-token:" | awk '{print $2}' | tr -d '\r\n')
            call_presence_api "Cookie + CSRF" \
              -H "Cookie: .ROBLOSECURITY=${ROBLOX_COOKIE}" \
              -H "x-csrf-token: ${CSRF}" \
              && SUCCESS=true
          fi

          # ── Method 3: Scrape public profile page (zero auth, zero maintenance)
          if [ "$SUCCESS" = "false" ]; then
            echo "--- Scraping public Roblox profile page ---"
            PAGE=$(curl -s -L --max-time 15 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
              "https://www.roblox.com/users/${USER_ID}/profile")

            if [ -n "$PAGE" ]; then
              echo "Page fetched (${#PAGE} bytes). Searching for presence..."

              if echo "$PAGE" | grep -qi 'icon-studio\|in.studio\|presenceType.*3\|"presenceType":3\|UserPresenceType.*3'; then
                write_presence 3 "Studio" "" ""
                SUCCESS=true
              elif echo "$PAGE" | grep -qi 'icon-game\|in.game\|presenceType.*2\|"presenceType":2\|UserPresenceType.*2'; then
                write_presence 2 "In Game" "" ""
                SUCCESS=true
              elif echo "$PAGE" | grep -qi 'icon-online\|isOnline.*true\|"isOnline":true\|presenceType.*1\|"presenceType":1\|UserPresenceType.*1'; then
                write_presence 1 "" "" ""
                SUCCESS=true
              else
                echo "No presence indicator found in HTML — assuming offline"
                write_presence 0 "" "" ""
                SUCCESS=true
              fi
            else
              echo "Profile page fetch returned empty response"
            fi
          fi

          # ── Final result ───────────────────────────────────────────────────
          if [ "$SUCCESS" = "false" ]; then
            echo "::warning::All presence methods failed."
          else
            echo "--- Final presence.json ---"
            cat data/presence.json
          fi

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/presence.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update presence [skip ci]"
            git pull --rebase origin main
            git push
          fi
