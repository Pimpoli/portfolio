<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting… — PimpoliDev</title>
</head>
<body>
<script>
(function () {
  var path = window.location.pathname.toLowerCase().replace(/\/+$/, '');
  var redirect = null;

  if (/\/(game[-_]?1|game1)$/i.test(path))
    redirect = '/Game-1/';
  else if (/\/(game[-_]?2|game2)$/i.test(path))
    redirect = '/Game-2/';
  else if (/\/(multigameinc|mgi|multi[-_]game[-_]?inc)$/i.test(path))
    redirect = '/MultiGameInc/';

  if (redirect) {
    // Preserve hash / query so ?destroygame still works after redirect
    window.location.replace(redirect + window.location.search + window.location.hash);
  } else {
    window.location.replace('/');
  }
})();
</script>
</body>
</html>
